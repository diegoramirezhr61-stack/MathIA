<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathIA</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="contenedor">

        <h1>MathIA</h1>

        <textarea id="pregunta" placeholder="Escribe tu problema matemático..."></textarea>

        <button onclick="enviarPregunta()">
            Preguntar
        </button>

        <div id="respuesta"></div>

    </div>

    <script>

                async function enviarPregunta() {

            let pregunta = document.getElementById("pregunta").value;

            let respuestaDiv = document.getElementById("respuesta");

            respuestaDiv.innerHTML = "Pensando...";

            const respuesta = await fetch("/preguntar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    pregunta: pregunta
                })
            });

            const datos = await respuesta.json();

            respuestaDiv.innerHTML = datos.respuesta;
        }

    </script>

</body>
</html>
